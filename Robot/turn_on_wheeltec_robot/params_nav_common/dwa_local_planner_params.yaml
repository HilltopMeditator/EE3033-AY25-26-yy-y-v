#DWAPlanner official intro: http://wiki.ros.org/dwa_local_planner

#Local path planner DWAPlannerROS namespace
DWAPlannerROS:
  #Robot parameter settings
  max_vel_x: 0.50         #The absolute value of the maximum linear velocity in the x-direction, in m/s.
  min_vel_x: -0.50        #The absolute value of the minimum linear velocity in the x-direction; a negative number indicates that backward movement is possible; unit: m/s.
  max_vel_y: 0.0          #The absolute value of the maximum linear velocity in the y-direction, in m/s. 0 for non-omnidirectional mobile robots.  
  min_vel_y: 0.0          #The absolute value of the minimum linear velocity in the y-direction, in m/s. 0 for non-omnidirectional mobile robots.
  max_vel_trans: 0.5      #The absolute value of the robot's maximum moving speed, in m/s.
  min_vel_trans: 0.1      #The absolute value of the robot's minimum moving speed, in m/s.
  trans_stopped_vel: 0.1  #The translational velocity at which the robot is considered to be in a "stopped" state. If the robot's velocity is lower than this value, the robot is considered to have stopped. The unit is m/s.
  max_vel_theta: 1.67     #The absolute value of the robot's maximum rotational angular velocity, in rad/s.
  min_vel_theta: 0.3      #The absolute value of the robot's minimum rotational angular velocity, in rad/s.
  theta_stopped_vel: 0.4 #The rotational speed of the robot when it is considered to be in a "stopped" state. The unit is rad/s.
  acc_lim_x: 2.0          #The robot's maximum acceleration in the x-direction, in m/s².
  acc_lim_theta: 3      #The robot's maximum rotational acceleration is measured in m/s².
  acc_lim_y: 0.0          #The robot's limiting acceleration in the y-direction, measured in m/s². For non-omnidirectional mobile robots, it is 0.

  #Target point error allowable value目标点误差允许值
  xy_goal_tolerance: 0.2   #The allowable radius deviation of the robot when it reaches the target point, within which the robot is considered to have reached the target point, is expressed in meters.
  yaw_goal_tolerance: 0.15 #The allowable radian deviation of the robot when it reaches the target point; within this deviation, the robot is considered to have reached the target point. The unit is rad.
  latch_xy_goal_tolerance: false #Setting it to true means that if the robot reaches the tolerance distance, it will rotate in place; even if the rotation will cause it to run outside the tolerance distance.

  #Forward simulation parameters
  sim_time: 2.0      #The time for forward trajectory simulation is expressed in seconds.
  vx_samples: 6      #Number of sampling points in the x-direction velocity space
  vy_samples: 0      #Number of space sampling points for velocity in the y-direction. A differential-driven robot always has only one value (0.0) in the y-direction.
  vtheta_samples: 20 #Number of space sampling points for velocity in the direction of rotation

  #Trajectory scoring parameters
  path_distance_bias: 1000.0   #Weights for the proximity of the controller to a given path
  goal_distance_bias: 500      #The weights of the proximity between the controller and the local target point are also used for speed control.
  occdist_scale: 5           #The degree to which the controller avoids obstacles
  forward_point_distance: 0.325 #An additional scoring point is placed at the distance from the robot.
  stop_time_buffer: 0.1         #The minimum amount of time a robot must have before a collision occurs. The trajectory used within this time is still considered valid. In other words, the length of time the robot must stop in advance to prevent a collision.
  scaling_speed: 0.25           #The absolute value of the velocity at which the robot's footprint begins to scale, in m/s.
  max_scaling_factor: 0.2       #Maximum scaling factor. `max_scaling_factor` is the value of the above expression.

  #Vibration prevention parameters
  oscillation_reset_dist: 0.05  #When a robot is moving, but the amplitude of the movement is not greater than a certain value, the robot is considered to be in an oscillating state, measured in meters (m).
  oscillation_reset_angle: 0.05 #When a robot is moving, but the amplitude of the movement is not greater than a certain value, the robot is considered to be in an oscillating state, measured in rad.

  #Debugging parameters
  publish_traj_pc : true     #Visualize the planned trajectory in rviz
  publish_cost_grid_pc: true #Visualize the value
  global_frame_id: map       #Global reference coordinate system

  #the previously visited paths removed from the path planning
  prune_plan: true
