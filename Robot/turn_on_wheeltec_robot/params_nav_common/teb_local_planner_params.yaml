#TebLocalPlanner official intro：http://wiki.ros.org/teb_local_planner

#Local path planner DWAPlannerROS namespace
TebLocalPlannerROS:
  odom_topic: odom #Subscribed to the odometer topic
  map_frame: map #TF reference coordinate system of the cost map

  #Obstacle parameters
  min_obstacle_dist: 0.1 #The minimum distance to the obstacle directly affects the robot's obstacle avoidance performance.
  include_costmap_obstacles: True #Whether dynamic obstacles be predicted as velocity models
  costmap_obstacles_behind_robot_dist: 1.5 #Limiting obstacles in the local cost map considered when planning the robot's rearward path.
  obstacle_poses_affected: 15  #The obstacle's attitude is affected in the range of 0~30
  costmap_converter_plugin: ""
  costmap_converter_spin_thread: True
  costmap_converter_rate: 5
  include_dynamic_obstacles: True 
  dynamic_obstacle_inflation_dist: 0.6

  #Target point error allowable value
  #The permissible radian deviation near the target point when the robot reaches it, within which the target point is considered reached, is expressed in rad.
  xy_goal_tolerance: 0.2  
  yaw_goal_tolerance: 0.1 
  free_goal_vel: False    #Allow the robot to travel to its destination at maximum speed.

  #Track configuration parameters
  teb_autosize: True #The time length of the trajectory can be changed during optimization.
  dt_ref: 0.45 #Resolution of local path planning, minimum 0.01
  dt_hysteresis: 0.1 #The permissible range of time-domain resolution variation is generally around 10% of dt_ref, with a minimum of 0.002.
  global_plan_overwrite_orientation: False #The orientation of local path points in the global path is covered.
  max_global_plan_lookahead_dist: 3.0 #Considering the maximum length of the global plan subset
  feasibility_check_no_poses: 5 #Minimum 0 for the time interval at which the pose can be detected

  #Trajectory optimization parameters
  no_inner_iterations: 5
  no_outer_iterations: 4
  optimization_activate: True
  optimization_verbose: False
  penalty_epsilon: 0.1
  obstacle_cost_exponent: 4
  weight_max_vel_x: 2
  weight_max_vel_theta: 1
  weight_acc_lim_x: 1
  weight_acc_lim_theta: 1
  weight_kinematics_nh: 1000
  weight_kinematics_forward_drive: 1
  weight_kinematics_turning_radius: 1
  weight_optimaltime: 1 #Must be greater than 0
  weight_shortest_path: 0
  weight_obstacle: 100
  weight_inflation: 0.2
  weight_dynamic_obstacle: 10 
  weight_dynamic_obstacle_inflation: 0.2
  weight_viapoint: 1
  weight_adapt_factor: 2

  #Parallel Programming in Different Topologies
  enable_homotopy_class_planning: False
  enable_multithreading: True
  max_number_classes: 4
  selection_cost_hysteresis: 1.0
  selection_prefer_initial_plan: 0.95
  selection_obst_cost_scale: 1.0
  selection_alternative_time_cost: False
  roadmap_graph_no_samples: 15
  roadmap_graph_area_width: 5
  roadmap_graph_area_length_scale: 1.0
  h_signature_prescaler: 0.5
  h_signature_threshold: 0.1
  obstacle_heading_threshold: 0.45
  switching_blocking_period: 0.0
  viapoints_all_candidates: True
  delete_detours_backwards: True
  max_ratio_detours_duration_best_duration: 3.0
  visualize_hc_graph: False
  visualize_with_time_as_z_axis_scale: False

  #Recovery behavior
  shrink_horizon_backup: True
  shrink_horizon_min_duration: 10
  oscillation_recovery: False
  oscillation_v_eps: 0.1
  oscillation_omega_eps: 0.1
  oscillation_recovery_min_duration: 10
  oscillation_filter_duration: 10
